name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v0.1.0'
        required: true
        type: string
      source_ref:
        description: 'Source ref used when creating a missing tag manually'
        required: true
        default: main
        type: string
      create_tag:
        description: 'Create the tag from source_ref when it does not exist'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish plugin release
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        run: |
          header_version="$(sed -nE 's/^[[:space:]*]*Version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*$/\1/ip' testimonials.php | head -n 1 | tr -d '\r')"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="v${header_version}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v0.1.0. Got: ${tag}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli
          coverage: none
          tools: composer:v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion unzip

      - name: Validate release version
        run: |
          header_version="$(sed -nE 's/^[[:space:]*]*Version:[[:space:]]*([^[:space:]].*)$/\1/ip' testimonials.php | head -n 1 | tr -d '\r')"
          stable_tag="$(sed -nE 's/^Stable tag:[[:space:]]*([^[:space:]].*)$/\1/ip' readme.txt | head -n 1 | tr -d '\r')"
          constant_version="$(sed -nE "s/^define\\( 'TESTIMONIALS_VERSION', '([^']+)' \\);/\\1/p" testimonials.php | head -n 1 | tr -d '\r')"

          if [[ "${header_version}" != "${{ steps.release.outputs.version }}" ]]; then
            echo "Plugin header version ${header_version} does not match tag ${{ steps.release.outputs.tag }}." >&2
            exit 1
          fi

          if [[ "${stable_tag}" != "${{ steps.release.outputs.version }}" ]]; then
            echo "readme.txt stable tag ${stable_tag} does not match tag ${{ steps.release.outputs.tag }}." >&2
            exit 1
          fi

          if [[ "${constant_version}" != "${{ steps.release.outputs.version }}" ]]; then
            echo "TESTIMONIALS_VERSION ${constant_version} does not match tag ${{ steps.release.outputs.tag }}." >&2
            exit 1
          fi

      - name: Create release tag when requested
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.create_tag) || (github.event_name == 'push' && github.ref_name == 'main') }}
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run unit tests
        run: composer test:unit

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root '' 127.0.0.1 latest true

      - name: Run WordPress integration tests
        run: composer test:wordpress

      - name: Build package
        run: composer package

      - name: Verify package contents
        run: |
          zip_file="dist/testimonials-${{ steps.release.outputs.version }}.zip"
          test -f "${zip_file}"
          unzip -l "${zip_file}" | tee package-files.txt
          unzip -l "${zip_file}" | grep -q "testimonials/testimonials.php"

          if unzip -l "${zip_file}" | grep -E "(tests/|\\.github/|\\.gitignore|AGENTS\\.md|\\.env|\\.npmrc|vendor/|node_modules/|phpunit|debug\\.log|\\.sql|\\.sqlite|build/)" ; then
            echo "Package contains development or sensitive files." >&2
            exit 1
          fi

      - name: Publish GitHub release
        run: |
          tag="${{ steps.release.outputs.tag }}"
          zip_file="dist/testimonials-${{ steps.release.outputs.version }}.zip"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${zip_file}" --clobber
          else
            gh release create "${tag}" "${zip_file}" \
              --title "${tag}" \
              --generate-notes \
              --verify-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
