name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump when version is empty'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: 'Explicit version, for example 0.2.0. Overrides bump when provided.'
        required: false
        type: string
      base_branch:
        description: 'Branch that receives the release PR'
        required: true
        default: develop
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release pull request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0

      - name: Resolve release input
        id: release_input
        run: |
          requested="${{ inputs.version }}"
          if [[ -z "${requested}" ]]; then
            requested="${{ inputs.bump }}"
          fi

          echo "requested=${requested}" >> "${GITHUB_OUTPUT}"

      - name: Prepare release files
        id: release
        run: |
          version="$(bash bin/prepare-release.sh "${{ steps.release_input.outputs.requested }}")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "branch=release/v${version}" >> "${GITHUB_OUTPUT}"

      - name: Commit release preparation
        run: |
          branch="${{ steps.release.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "${branch}"
          git add testimonials.php readme.txt CHANGELOG.md
          git commit -m "Prepare release ${{ steps.release.outputs.tag }}"
          git push --force-with-lease origin "${branch}"

      - name: Open or update release PR
        run: |
          branch="${{ steps.release.outputs.branch }}"
          title="Prepare release ${{ steps.release.outputs.tag }}"
          body="$(mktemp)"

          cat > "${body}" <<'BODY'
          ## Release preparation

          This PR updates the plugin version surfaces and changelog for the release.

          After this PR is merged into `develop`, open and merge the release PR from `develop` into `main`.

          The `Release` workflow runs from `main`, creates the tag `${{ steps.release.outputs.tag }}` if needed, validates the package, publishes the GitHub Release, and uploads the WordPress-installable ZIP asset.
          BODY

          existing_pr="$(gh pr list \
            --head "${branch}" \
            --base "${{ inputs.base_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" --title "${title}" --body-file "${body}"
          else
            gh pr create \
              --base "${{ inputs.base_branch }}" \
              --head "${branch}" \
              --title "${title}" \
              --body-file "${body}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
